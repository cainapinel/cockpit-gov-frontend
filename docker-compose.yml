version: '3.8'

services:
  frontend:
    image: node:20-alpine
    container_name: cockpit_frontend_dev
    working_dir: /app
    # Executa a instalação de pacotes e levanta o servidor Vite (expondo para fora do container)
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      # Monta todo o seu código local para dentro do container (permite Hot Reload em tempo real)
      - ./:/app
      # Volume anônimo/nomeado para isolar os node_modules do Linux (evita conflitos de binários como o esbuild com o seu macOS)
      - cockpit_node_modules:/app/node_modules
    environment:
      # Garante que as mudanças nos arquivos reflitam instantaneamente no Docker
      - CHOKIDAR_USEPOLLING=true
      # Aponta a URL da API para o seu backend rodando em outro terminal/container local
      - VITE_API_URL=http://localhost:8000

volumes:
  cockpit_node_modules:
